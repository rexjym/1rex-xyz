<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto News AI Score | 加密货币新闻AI评分</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .card-glow:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }
        .score-bullish { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .score-bearish { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .score-neutral { background: linear-gradient(135deg, #6b7280, #4b5563); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Crypto News AI Score
            </h1>
            <p class="text-gray-400">加密货币新闻 AI 5维情绪分析 (本地模型)</p>
            <div class="mt-4 flex justify-center gap-4">
                <button onclick="refreshNews()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-medium transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    刷新新闻
                </button>
                <select id="coinFilter" onchange="filterByCoin()" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-lg">
                    <option value="all">全部币种</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Ethereum</option>
                    <option value="SOL">Solana</option>
                    <option value="BNB">BNB</option>
                </select>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-blue-400" id="avgMomentum">-</div>
                <div class="text-gray-400 text-sm">动量</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-purple-400" id="avgVolume">-</div>
                <div class="text-gray-400 text-sm">热度</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-yellow-400" id="avgSentiment">-</div>
                <div class="text-gray-400 text-sm">情绪</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-green-400" id="avgUtility">-</div>
                <div class="text-gray-400 text-sm">实用性</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-red-400" id="avgRisk">-</div>
                <div class="text-gray-400 text-sm">风险</div>
            </div>
        </div>

        <div class="text-center mb-8">
            <div class="inline-block bg-gradient-to-r from-blue-600 to-purple-600 px-8 py-3 rounded-xl">
                <div class="text-3xl font-bold" id="totalScore">-</div>
                <div class="text-sm text-gray-200">总分 (25分制)</div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-400">正在获取加密货币热点并进行本地 AI 模型分析...</p>
        </div>

        <!-- News Grid -->
        <div id="newsGrid" class="grid gap-4 md:grid-cols-2"></div>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>数据来源: CoinGecko Trending | AI 分析: Mac Studio 本地模型 (OMLX)</p>
            <p class="mt-1">更新时间: <span id="lastUpdate">-</span></p>
        </footer>
    </div>

    <script>
        // Cloudflare Tunnel URL - UPDATE THIS IF CHANGED
        const OMLX_BASE_URL = 'https://beds-theme-petite-offset.trycloudflare.com';
        
        let allNews = [];
        let analysisCache = {};

        // 5 Dimensions:
        // 1. momentum (动量): 价格动量/趋势强度 0-5
        // 2. volume (热度): 市场关注度/交易活跃度 0-5
        // 3. sentiment (情绪): 市场情绪方向 0-5
        // 4. utility (实用性): 信息对投资决策的帮助程度 0-5
        // 5. risk (风险): 潜在风险程度 0-5

        function extractCoins(title) {
            const coins = [];
            const titleLower = title.toLowerCase();
            
            const coinMap = {
                'bitcoin': 'BTC', 'btc': 'BTC',
                'ethereum': 'ETH', 'eth': 'ETH',
                'solana': 'SOL', 'sol': 'SOL',
                'bnb': 'BNB', 'binance': 'BNB',
                'ripple': 'XRP', 'xrp': 'XRP',
                'cardano': 'ADA', 'ada': 'ADA',
                'dogecoin': 'DOGE', 'doge': 'DOGE',
                'tron': 'TRX', 'trx': 'TRX'
            };
            
            Object.keys(coinMap).forEach(key => {
                if (titleLower.includes(key) && !coins.includes(coinMap[key])) {
                    coins.push(coinMap[key]);
                }
            });
            
            return [...new Set(coins)].slice(0, 3);
        }

        async function analyzeWithAI(title) {
            const cacheKey = title.substring(0, 50);
            if (analysisCache[cacheKey]) {
                return analysisCache[cacheKey];
            }

            try {
                const response = await fetch(`${OMLX_BASE_URL}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer 22446688',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'Qwen3.5-27B-Claude-4.6-Opus-Distilled-MLX-4bit',
                        messages: [
                            {
                                role: 'system',
                                content: `你是一个专业的加密货币情绪分析师。请分析以下新闻标题，从5个维度进行评分。

评分维度（每个0-5分，总分25分）：
1. 动量(momentum): 价格动量/趋势强度，5分=强势上涨/突破，1分=弱势下跌
2. 热度(volume): 市场关注度/讨论热度，5分=高度关注，1分=无人问津
3. 情绪(sentiment): 市场整体情绪，5分=极度乐观，1分=极度悲观
4. 实用性(utility): 对投资决策的帮助，5分=非常有价值，1分=无价值
5. 风险(risk): 潜在风险程度，5分=高风险需谨慎，1分=安全无风险

请严格按以下JSON格式输出，不要有其他内容：
{"momentum":0-5,"volume":0-5,"sentiment":0-5,"utility":0-5,"risk":0-5}`
                            },
                            {
                                role: 'user',
                                content: `分析这个加密货币新闻：${title}`
                            }
                        ],
                        max_tokens: 200,
                        temperature: 0.3
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                try {
                    const result = JSON.parse(content);
                    // Validate scores
                    const scores = {
                        momentum: Math.min(5, Math.max(0, Math.round(result.momentum || 3))),
                        volume: Math.min(5, Math.max(0, Math.round(result.volume || 3))),
                        sentiment: Math.min(5, Math.max(0, Math.round(result.sentiment || 3))),
                        utility: Math.min(5, Math.max(0, Math.round(result.utility || 3))),
                        risk: Math.min(5, Math.max(0, Math.round(result.risk || 3)))
                    };
                    scores.total = scores.momentum + scores.volume + scores.sentiment + scores.utility + scores.risk;
                    analysisCache[cacheKey] = scores;
                    return scores;
                } catch (e) {
                    console.log('JSON parse failed, using fallback');
                    return getDefaultScores();
                }
            } catch (error) {
                console.error('AI分析失败:', error);
                return getDefaultScores();
            }
        }

        function getDefaultScores() {
            const scores = {
                momentum: 3,
                volume: 3,
                sentiment: 3,
                utility: 3,
                risk: 3,
                total: 15
            };
            return scores;
        }

        async function refreshNews() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').querySelector('p').textContent = '正在获取加密货币热点并进行本地 AI 模型分析...';
            document.getElementById('newsGrid').innerHTML = '';
            
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/search/trending');
                const data = await response.json();
                
                const newsPromises = data.coins.slice(0, 8).map(async (coinItem, index) => {
                    const item = coinItem.item;
                    const title = item.name + ' (' + item.symbol.toUpperCase() + '): Trending #' + item.market_cap_rank;
                    
                    let scores;
                    try {
                        document.getElementById('loading').querySelector('p').textContent = `AI 分析中: ${index + 1}/${Math.min(8, data.coins.length)}`;
                        scores = await analyzeWithAI(title);
                    } catch (e) {
                        scores = getDefaultScores();
                    }
                    
                    const coins = extractCoins(title);
                    
                    return {
                        id: index,
                        title: title,
                        source: 'CoinGecko',
                        url: 'https://www.coingecko.com/en/coins/' + item.id,
                        published: new Date().toISOString(),
                        coins: coins.length > 0 ? coins : [item.symbol.toUpperCase()],
                        ...scores,
                        keywords: [item.symbol.toUpperCase(), item.market_cap_rank <= 10 ? 'Top10' : 'Altcoin'],
                        priceChange24h: item.data?.price_change_percentage_24h || 0
                    };
                });
                
                allNews = await Promise.all(newsPromises);
                
                renderNews();
                updateStats();
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('newsGrid').innerHTML = '<div class="text-center text-red-400 col-span-2">获取数据失败，请刷新重试</div>';
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            const filter = document.getElementById('coinFilter').value;
            
            const filtered = filter === 'all' 
                ? allNews 
                : allNews.filter(n => n.coins.includes(filter));
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="text-center text-gray-400 col-span-2">暂无相关新闻</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(news => {
                // Determine overall sentiment based on total score
                let sentimentClass = 'score-neutral';
                let sentimentLabel = '➡️ 中性';
                if (news.total >= 18) {
                    sentimentClass = 'score-bullish';
                    sentimentLabel = '🐂 看涨';
                } else if (news.total <= 10) {
                    sentimentClass = 'score-bearish';
                    sentimentLabel = '🐻 看跌';
                }
                
                const priceChangeColor = news.priceChange24h >= 0 ? 'text-green-400' : 'text-red-400';
                
                return `
                    <div class="bg-gray-800/50 backdrop-blur rounded-xl p-6 card-glow transition border border-gray-700/50">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs text-gray-400">${news.source}</span>
                            <span class="text-xs ${priceChangeColor}">${news.priceChange24h >= 0 ? '↑' : '↓'}${Math.abs(news.priceChange24h || 0).toFixed(2)}%</span>
                        </div>
                        <h3 class="text-lg font-semibold mb-3">${news.title}</h3>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${news.keywords.map(k => `<span class="bg-gray-700 px-2 py-1 rounded text-xs">${k}</span>`).join('')}
                            ${news.coins.map(c => `<span class="bg-blue-900/50 text-blue-300 px-2 py-1 rounded text-xs">${c}</span>`).join('')}
                        </div>
                        
                        <!-- 5 Dimensions Score -->
                        <div class="grid grid-cols-5 gap-2 mb-4 text-center">
                            <div class="bg-gray-700/50 rounded p-2">
                                <div class="text-lg font-bold text-blue-400">${news.momentum}</div>
                                <div class="text-xs text-gray-400">动量</div>
                            </div>
                            <div class="bg-gray-700/50 rounded p-2">
                                <div class="text-lg font-bold text-purple-400">${news.volume}</div>
                                <div class="text-xs text-gray-400">热度</div>
                            </div>
                            <div class="bg-gray-700/50 rounded p-2">
                                <div class="text-lg font-bold text-yellow-400">${news.sentiment}</div>
                                <div class="text-xs text-gray-400">情绪</div>
                            </div>
                            <div class="bg-gray-700/50 rounded p-2">
                                <div class="text-lg font-bold text-green-400">${news.utility}</div>
                                <div class="text-xs text-gray-400">实用</div>
                            </div>
                            <div class="bg-gray-700/50 rounded p-2">
                                <div class="text-lg font-bold text-red-400">${news.risk}</div>
                                <div class="text-xs text-gray-400">风险</div>
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="${sentimentClass} px-3 py-1 rounded-lg text-sm font-bold">
                                    ${news.total}/25
                                </div>
                                <span class="text-sm">${sentimentLabel}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterByCoin() {
            renderNews();
        }

        function updateStats() {
            if (allNews.length === 0) return;
            
            const avgMomentum = Math.round(allNews.reduce((a, b) => a + b.momentum, 0) / allNews.length * 10) / 10;
            const avgVolume = Math.round(allNews.reduce((a, b) => a + b.volume, 0) / allNews.length * 10) / 10;
            const avgSentiment = Math.round(allNews.reduce((a, b) => a + b.sentiment, 0) / allNews.length * 10) / 10;
            const avgUtility = Math.round(allNews.reduce((a, b) => a + b.utility, 0) / allNews.length * 10) / 10;
            const avgRisk = Math.round(allNews.reduce((a, b) => a + b.risk, 0) / allNews.length * 10) / 10;
            const totalAvg = Math.round(allNews.reduce((a, b) => a + b.total, 0) / allNews.length);
            
            document.getElementById('avgMomentum').textContent = avgMomentum;
            document.getElementById('avgVolume').textContent = avgVolume;
            document.getElementById('avgSentiment').textContent = avgSentiment;
            document.getElementById('avgUtility').textContent = avgUtility;
            document.getElementById('avgRisk').textContent = avgRisk;
            document.getElementById('totalScore').textContent = totalAvg;
        }

        // Initial load
        refreshNews();
    </script>
</body>
</html>
