<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto News AI Score | 加密货币新闻AI评分</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .card-glow:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }
        .score-bullish { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .score-bearish { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .score-neutral { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Crypto News AI Score
            </h1>
            <p class="text-gray-400">加密货币新闻 AI 情绪分析</p>
            <div class="mt-4 flex justify-center gap-4">
                <button onclick="refreshNews()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-medium transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    刷新新闻
                </button>
                <select id="coinFilter" onchange="filterByCoin()" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-lg">
                    <option value="all">全部币种</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Ethereum</option>
                    <option value="SOL">Solana</option>
                    <option value="BNB">BNB</option>
                </select>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-blue-400" id="totalNews">-</div>
                <div class="text-gray-400 text-sm">新闻总数</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-green-400" id="bullishCount">-</div>
                <div class="text-gray-400 text-sm">看涨</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-red-400" id="bearishCount">-</div>
                <div class="text-gray-400 text-sm">看跌</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-gray-400" id="avgScore">-</div>
                <div class="text-gray-400 text-sm">平均情绪分</div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-400">正在获取新闻并进行 AI 分析...</p>
        </div>

        <!-- News Grid -->
        <div id="newsGrid" class="grid gap-4 md:grid-cols-2"></div>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>数据来源: CryptoPanic | AI 分析: 本地模型</p>
            <p class="mt-1">更新时间: <span id="lastUpdate">-</span></p>
        </footer>
    </div>

    <script>
        let allNews = [];

        // Mock news data (in production, use real API)
        const mockNews = [
            { id: 1, title: "Bitcoin Surges Past $75K as Institutional Demand Continues", source: "CoinDesk", url: "#", published: new Date().toISOString(), coins: ["BTC"] },
            { id: 2, title: "Ethereum Foundation Announces Major Protocol Upgrade for Q2", source: "Decrypt", url: "#", published: new Date().toISOString(), coins: ["ETH"] },
            { id: 3, title: "Solana Network Experiences Brief Outage, Team Deploys Fix", source: "The Block", url: "#", published: new Date().toISOString(), coins: ["SOL"] },
            { id: 4, title: "SEC Delays Decision on Multiple Ethereum ETF Applications", source: "Bloomberg", url: "#", published: new Date().toISOString(), coins: ["ETH"] },
            { id: 5, title: "BNB Chain Launches New Developer Incentive Program Worth $100M", source: "Binance", url: "#", published: new Date().toISOString(), coins: ["BNB"] },
            { id: 6, title: "Major Bank Announces Bitcoin Custody Service for Wealth Clients", source: "Reuters", url: "#", published: new Date().toISOString(), coins: ["BTC"] },
            { id: 7, title: "DeFi Total Value Locked Reaches New All-Time High", source: "DeFi Llama", url: "#", published: new Date().toISOString(), coins: ["ETH"] },
            { id: 8, title: "Regulatory Concerns Grow as Stablecoin Market Expands", source: "FTX", url: "#", published: new Date().toISOString(), coins: ["BTC", "ETH"] },
        ];

        // AI Scoring Logic
        function analyzeSentiment(title) {
            const bullishKeywords = ['surge', 'surges', 'rally', 'bullish', 'breakout', 'high', 'record', 'gain', 'growth', 'adoption', 'launch', 'upgrade', 'incentive', 'institutional', 'custody', 'all-time high', 'value locked'];
            const bearishKeywords = ['crash', 'crashes', 'plunge', 'bearish', 'breakdown', 'low', 'loss', 'decline', 'outage', 'delay', 'concern', 'regulatory', 'warning', 'hack', 'scam', 'ban'];
            
            const lowerTitle = title.toLowerCase();
            let bullishScore = 0;
            let bearishScore = 0;
            
            bullishKeywords.forEach(k => { if(lowerTitle.includes(k)) bullishScore++; });
            bearishKeywords.forEach(k => { if(lowerTitle.includes(k)) bearishScore++; });
            
            if (bullishScore > bearishScore) return { sentiment: 'bullish', score: Math.min(95, 50 + bullishScore * 15) };
            if (bearishScore > bullishScore) return { sentiment: 'bearish', score: Math.max(5, 50 - bearishScore * 15) };
            
            return { sentiment: 'neutral', score: 50 };
        }

        function getImpactScore(title, source) {
            const highImpactSources = ['Bloomberg', 'Reuters', 'SEC', 'CoinDesk'];
            let score = 5;
            if (highImpactSources.some(s => source.includes(s))) score += 3;
            if (title.toLowerCase().includes('etf')) score += 2;
            if (title.toLowerCase().includes('institutional')) score += 2;
            return Math.min(10, score);
        }

        function extractKeywords(title) {
            const keywords = ['Bitcoin', 'Ethereum', 'Solana', 'BNB', 'DeFi', 'ETF', 'SEC', 'institutional', 'regulatory', 'network', 'protocol', 'developer'];
            return keywords.filter(k => title.toLowerCase().includes(k.toLowerCase()));
        }

        async function refreshNews() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('newsGrid').innerHTML = '';
            
            // Simulate API delay
            await new Promise(r => setTimeout(r, 1500));
            
            allNews = mockNews.map(news => {
                const analysis = analyzeSentiment(news.title);
                return {
                    ...news,
                    sentiment: analysis.sentiment,
                    score: Math.round(analysis.score),
                    impact: getImpactScore(news.title, news.source),
                    keywords: extractKeywords(news.title)
                };
            });
            
            renderNews();
            updateStats();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            const filter = document.getElementById('coinFilter').value;
            
            const filtered = filter === 'all' 
                ? allNews 
                : allNews.filter(n => n.coins.includes(filter));
            
            grid.innerHTML = filtered.map(news => {
                const scoreClass = news.sentiment === 'bullish' ? 'score-bullish' : 
                                 news.sentiment === 'bearish' ? 'score-bearish' : 'score-neutral';
                const sentimentLabel = news.sentiment === 'bullish' ? '🐂 看涨' : 
                                     news.sentiment === 'bearish' ? '🐻 看跌' : '➡️ 中性';
                
                return `
                    <div class="bg-gray-800/50 backdrop-blur rounded-xl p-6 card-glow transition border border-gray-700/50">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs text-gray-400">${news.source}</span>
                            <span class="text-xs text-gray-500">${new Date(news.published).toLocaleTimeString('zh-CN')}</span>
                        </div>
                        <h3 class="text-lg font-semibold mb-3">${news.title}</h3>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${news.keywords.map(k => `<span class="bg-gray-700 px-2 py-1 rounded text-xs">${k}</span>`).join('')}
                            ${news.coins.map(c => `<span class="bg-blue-900/50 text-blue-300 px-2 py-1 rounded text-xs">${c}</span>`).join('')}
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="${scoreClass} px-3 py-1 rounded-lg text-sm font-medium">
                                    ${news.score}
                                </div>
                                <span class="text-sm">${sentimentLabel}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-gray-400 text-sm">影响力:</span>
                                <span class="text-yellow-400 font-medium">${news.impact}/10</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterByCoin() {
            renderNews();
        }

        function updateStats() {
            const bullish = allNews.filter(n => n.sentiment === 'bullish').length;
            const bearish = allNews.filter(n => n.sentiment === 'bearish').length;
            const avg = Math.round(allNews.reduce((a, b) => a + b.score, 0) / allNews.length);
            
            document.getElementById('totalNews').textContent = allNews.length;
            document.getElementById('bullishCount').textContent = bullish;
            document.getElementById('bearishCount').textContent = bearish;
            document.getElementById('avgScore').textContent = avg;
        }

        // Initial load
        refreshNews();
    </script>
</body>
</html>
