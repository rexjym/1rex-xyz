<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto News AI Score | 加密货币新闻AI评分</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .card-glow:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
        }
        .score-bullish { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .score-bearish { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .score-neutral { background: linear-gradient(135deg, #6b7280, #4b5563); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Crypto News AI Score
            </h1>
            <p class="text-gray-400">加密货币新闻 AI 情绪分析 (本地模型)</p>
            <div class="mt-4 flex justify-center gap-4">
                <button onclick="refreshNews()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-medium transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    刷新新闻
                </button>
                <select id="coinFilter" onchange="filterByCoin()" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-lg">
                    <option value="all">全部币种</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Ethereum</option>
                    <option value="SOL">Solana</option>
                    <option value="BNB">BNB</option>
                </select>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-blue-400" id="totalNews">-</div>
                <div class="text-gray-400 text-sm">新闻总数</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-green-400" id="bullishCount">-</div>
                <div class="text-gray-400 text-sm">看涨</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-red-400" id="bearishCount">-</div>
                <div class="text-gray-400 text-sm">看跌</div>
            </div>
            <div class="bg-gray-800/50 backdrop-blur rounded-xl p-4 text-center">
                <div class="text-2xl font-bold text-gray-400" id="avgScore">-</div>
                <div class="text-gray-400 text-sm">平均情绪分</div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-400">正在获取加密货币热点并进行本地 AI 模型分析...</p>
        </div>

        <!-- News Grid -->
        <div id="newsGrid" class="grid gap-4 md:grid-cols-2"></div>

        <!-- Footer -->
        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>数据来源: CoinGecko Trending | AI 分析: Mac Studio 本地模型 (OMLX)</p>
            <p class="mt-1">更新时间: <span id="lastUpdate">-</span></p>
        </footer>
    </div>

    <script>
        // Cloudflare Tunnel URL for local OMLX model
        const OMLX_BASE_URL = 'https://mask-cooling-ant-thumbnails.trycloudflare.com';
        
        let allNews = [];
        let analysisCache = {};

        // Extract coins from title
        function extractCoins(title) {
            const coins = [];
            const titleLower = title.toLowerCase();
            
            const coinMap = {
                'bitcoin': 'BTC', 'btc': 'BTC',
                'ethereum': 'ETH', 'eth': 'ETH',
                'solana': 'SOL', 'sol': 'SOL',
                'bnb': 'BNB', 'binance': 'BNB',
                'ripple': 'XRP', 'xrp': 'XRP',
                'cardano': 'ADA', 'ada': 'ADA',
                'dogecoin': 'DOGE', 'doge': 'DOGE',
                'tron': 'TRX', 'trx': 'TRX'
            };
            
            Object.keys(coinMap).forEach(key => {
                if (titleLower.includes(key) && !coins.includes(coinMap[key])) {
                    coins.push(coinMap[key]);
                }
            });
            
            return [...new Set(coins)].slice(0, 3);
        }

        // Call local AI model via Cloudflare Tunnel
        async function analyzeWithAI(title) {
            // Check cache
            const cacheKey = title.substring(0, 50);
            if (analysisCache[cacheKey]) {
                return analysisCache[cacheKey];
            }

            try {
                const response = await fetch(`${OMLX_BASE_URL}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer 22446688',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'Qwen3.5-27B-Claude-4.6-Opus-Distilled-MLX-4bit',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个专业的加密货币情绪分析师。请分析以下新闻标题，输出JSON格式的分析结果。输出格式：{"sentiment":"bullish/bearish/neutral","score":0-100,"reason":"简短原因"}'
                            },
                            {
                                role: 'user',
                                content: `分析这个加密货币新闻标题的情绪：${title}`
                            }
                        ],
                        max_tokens: 150,
                        temperature: 0.3
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // Parse JSON response
                try {
                    const result = JSON.parse(content);
                    analysisCache[cacheKey] = result;
                    return result;
                } catch (e) {
                    // If JSON parsing fails, try to extract sentiment from text
                    const lowerContent = content.toLowerCase();
                    if (lowerContent.includes('bullish') || lowerContent.includes('看涨')) {
                        return { sentiment: 'bullish', score: 70, reason: 'AI判断看涨' };
                    } else if (lowerContent.includes('bearish') || lowerContent.includes('看跌')) {
                        return { sentiment: 'bearish', score: 30, reason: 'AI判断看跌' };
                    }
                    return { sentiment: 'neutral', score: 50, reason: 'AI判断中性' };
                }
            } catch (error) {
                console.error('AI分析失败:', error);
                // Fallback to local analysis
                return analyzeSentimentLocal(title);
            }
        }

        // Local fallback sentiment analysis
        function analyzeSentimentLocal(title) {
            const text = title.toLowerCase();
            const bullishKeywords = ['surge', 'surges', 'rally', 'bullish', 'breakout', 'high', 'record', 'gain', 'growth', 'adoption', 'launch', 'upgrade', 'institutional', 'all-time high', 'up', 'rise'];
            const bearishKeywords = ['crash', 'crashes', 'plunge', 'bearish', 'breakdown', 'low', 'loss', 'decline', 'outage', 'delay', 'concern', 'regulatory', 'hack', 'ban', 'down', 'fall', 'drop'];
            
            let bullishScore = 0;
            let bearishScore = 0;
            
            bullishKeywords.forEach(k => { if(text.includes(k)) bullishScore++; });
            bearishKeywords.forEach(k => { if(text.includes(k)) bearishScore++; });
            
            if (bullishScore > bearishScore) return { sentiment: 'bullish', score: Math.min(95, 50 + bullishScore * 15), reason: '关键词分析' };
            if (bearishScore > bullishScore) return { sentiment: 'bearish', score: Math.max(5, 50 - bearishScore * 15), reason: '关键词分析' };
            
            return { sentiment: 'neutral', score: 50, reason: '关键词分析' };
        }

        function getImpactScore(title) {
            const highImpactKeywords = ['bitcoin', 'ethereum', 'sec', 'etf', 'institutional', 'blackrock', ' Fidelity', 'regulation', '批准', 'launch'];
            let score = 5;
            const lowerTitle = title.toLowerCase();
            highImpactKeywords.forEach(k => {
                if(lowerTitle.includes(k)) score += 2;
            });
            return Math.min(10, score);
        }

        async function refreshNews() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').querySelector('p').textContent = '正在获取加密货币热点并进行本地 AI 模型分析...';
            document.getElementById('newsGrid').innerHTML = '';
            
            try {
                // Fetch from CoinGecko Trending API
                const response = await fetch('https://api.coingecko.com/api/v3/search/trending');
                const data = await response.json();
                
                // Process each news with AI
                const newsPromises = data.coins.slice(0, 8).map(async (coinItem, index) => {
                    const item = coinItem.item;
                    const title = item.name + ' (' + item.symbol.toUpperCase() + '): Trending #' + item.market_cap_rank;
                    
                    // Try AI analysis, fallback to local
                    let analysis;
                    try {
                        document.getElementById('loading').querySelector('p').textContent = `AI 分析中: ${index + 1}/${Math.min(8, data.coins.length)}`;
                        analysis = await analyzeWithAI(title);
                    } catch (e) {
                        analysis = analyzeSentimentLocal(title);
                    }
                    
                    const coins = extractCoins(title);
                    
                    return {
                        id: index,
                        title: title,
                        source: 'CoinGecko',
                        url: 'https://www.coingecko.com/en/coins/' + item.id,
                        published: new Date().toISOString(),
                        coins: coins.length > 0 ? coins : [item.symbol.toUpperCase()],
                        sentiment: analysis.sentiment || 'neutral',
                        score: analysis.score || 50,
                        reason: analysis.reason || '',
                        impact: getImpactScore(title),
                        keywords: [item.symbol.toUpperCase(), item.market_cap_rank <= 10 ? 'Top10' : 'Altcoin'],
                        priceChange24h: item.data?.price_change_percentage_24h || 0
                    };
                });
                
                allNews = await Promise.all(newsPromises);
                
                renderNews();
                updateStats();
            } catch (error) {
                console.error('Error fetching news:', error);
                document.getElementById('newsGrid').innerHTML = '<div class="text-center text-red-400 col-span-2">获取数据失败，请刷新重试</div>';
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            const filter = document.getElementById('coinFilter').value;
            
            const filtered = filter === 'all' 
                ? allNews 
                : allNews.filter(n => n.coins.includes(filter));
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="text-center text-gray-400 col-span-2">暂无相关新闻</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(news => {
                const scoreClass = news.sentiment === 'bullish' ? 'score-bullish' : 
                                 news.sentiment === 'bearish' ? 'score-bearish' : 'score-neutral';
                const sentimentLabel = news.sentiment === 'bullish' ? '🐂 看涨' : 
                                     news.sentiment === 'bearish' ? '🐻 看跌' : '➡️ 中性';
                
                const priceChangeColor = news.priceChange24h >= 0 ? 'text-green-400' : 'text-red-400';
                
                return `
                    <div class="bg-gray-800/50 backdrop-blur rounded-xl p-6 card-glow transition border border-gray-700/50">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs text-gray-400">${news.source}</span>
                            <span class="text-xs ${priceChangeColor}">${news.priceChange24h >= 0 ? '↑' : '↓'}${Math.abs(news.priceChange24h || 0).toFixed(2)}%</span>
                        </div>
                        <h3 class="text-lg font-semibold mb-3">${news.title}</h3>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${news.keywords.map(k => `<span class="bg-gray-700 px-2 py-1 rounded text-xs">${k}</span>`).join('')}
                            ${news.coins.map(c => `<span class="bg-blue-900/50 text-blue-300 px-2 py-1 rounded text-xs">${c}</span>`).join('')}
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="${scoreClass} px-3 py-1 rounded-lg text-sm font-medium">
                                    ${news.score}
                                </div>
                                <span class="text-sm">${sentimentLabel}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-gray-400 text-sm">影响力:</span>
                                <span class="text-yellow-400 font-medium">${news.impact}/10</span>
                            </div>
                        </div>
                        ${news.reason ? `<div class="mt-2 text-xs text-gray-500">${news.reason}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function filterByCoin() {
            renderNews();
        }

        function updateStats() {
            const bullish = allNews.filter(n => n.sentiment === 'bullish').length;
            const bearish = allNews.filter(n => n.sentiment === 'bearish').length;
            const avg = allNews.length > 0 ? Math.round(allNews.reduce((a, b) => a + b.score, 0) / allNews.length) : 0;
            
            document.getElementById('totalNews').textContent = allNews.length;
            document.getElementById('bullishCount').textContent = bullish;
            document.getElementById('bearishCount').textContent = bearish;
            document.getElementById('avgScore').textContent = avg;
        }

        // Initial load
        refreshNews();
    </script>
</body>
</html>
